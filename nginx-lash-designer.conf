# Bot Studio Lash — nginx
# Coexiste com o bot-barbeiro na mesma VM: este usa a porta 8444 (barbeiro: 8443)
# e faz proxy para o Express na porta 3003 (barbeiro: 3002).
# Dashboard:  https://jota-azure.chilecentral.cloudapp.azure.com:8444/admin
server {
    listen 8444 ssl;
    server_name jota-azure.chilecentral.cloudapp.azure.com;

    ssl_certificate     /etc/letsencrypt/live/jota-azure.chilecentral.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jota-azure.chilecentral.cloudapp.azure.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    server_tokens off;

    # Webhook — WAHA chama este endpoint internamente
    location /webhook/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Admin dashboard
    location /admin {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API
    location /api/ {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }
}
